<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <style>
    .title { font: bold 20px sans-serif; fill:#0f172a; }
    .box { fill:#f1f5f9; stroke:#0ea5e9; stroke-width:2; rx:12; }
    .text { font: 13px sans-serif; fill:#0f172a; }
    .line { stroke:#475569; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="30" y="30" class="title">Frontend → Orchestrator → Storage Workflow</text>

  <rect x="30" y="60" width="240" height="120" class="box" />
  <text x="45" y="90" class="text">User Browser</text>
  <text x="45" y="110" class="text">`frontend/index.html`</text>
  <text x="45" y="130" class="text">Prompt input + history</text>

  <rect x="330" y="60" width="240" height="120" class="box" />
  <text x="345" y="90" class="text">API Server</text>
  <text x="345" y="110" class="text">`server.py`</text>
  <text x="345" y="130" class="text">`/api/chat`, `/api/history`</text>

  <rect x="630" y="60" width="240" height="120" class="box" />
  <text x="645" y="90" class="text">Background Pipeline</text>
  <text x="645" y="110" class="text">`orchestrate_full_pipeline()`</text>
  <text x="645" y="130" class="text">Agents manage each stage</text>

  <rect x="330" y="220" width="240" height="120" class="box" />
  <text x="345" y="250" class="text">Artifacts</text>
  <text x="345" y="270" class="text">Saved to `storage/`</text>
  <text x="345" y="290" class="text">dashboards, plots, CSVs</text>

  <line x1="270" y1="120" x2="330" y2="120" class="line" />
  <line x1="570" y1="120" x2="630" y2="120" class="line" />
  <line x1="500" y1="180" x2="500" y2="220" class="line" />
  <line x1="390" y1="260" x2="390" y2="220" class="line" />
</svg>